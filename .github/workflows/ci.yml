name: CI

on: [push, pull_request]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build

  benchmarks:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run benchmarks
        run: dotnet run -c Release --project benchmarks/AutoInstrument.Benchmarks -- --filter '*' --exporters json

      - name: Find benchmark result file
        id: find-result
        run: echo "file=$(find BenchmarkDotNet.Artifacts/results -name '*-report-full-compressed.json' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/
          retention-days: 90

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: AutoInstrument Benchmarks
          tool: benchmarkdotnet
          output-file-path: ${{ steps.find-result.outputs.file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
